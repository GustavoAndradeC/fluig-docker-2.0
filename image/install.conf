#
#Fluig 2.0.0
#
#Diretorio onde o fluig sera instalado. Usar duas barras (\\) como separador de pastas no windows.
INSTALL_PATH=/opt/fluig
#serverName= Renomeado para: server_name
#serverPort= Renomeado para: server_port
#heapSize= Renomeado para: server_memory_heapSize
#heapMaxSize= Renomeado para: server_memory_heapMaxSize
#EJBPollSize= Renomeado para: server_pool_EJBPollSize
#IP ou Host do servidor
server_name=127.0.0.1
#Porta para o servidor web
server_port=8080
#Tamanho minimo da memoria alocada para o fluig
server_memory_heapSize=2g
#Tamanho maximo da memoria alocada para o fluig
server_memory_heapMaxSize=4g
#Tamanho dos POOLs de EJBs
server_pool_EJBPoolSize=30
#URL de acesso ao fluig
server_accessUrl=
#Habilita/Desabilita os cabecalhos de X-Frame
server_xframeHeadersEnabled=true
#Habilita/Desabilita seguranca nos cookies (exige https para habilitar)
server_secureHeadersEnabled=false
#Habilita/Desabilita os Headers Access-Control-Allow
server_accessConntrolHeadersEnabled=true
#Habilita/Desabilita a gera??o de estat?sticas do servidor
server_statisticsEnabled=false
#Habilita/Desabilita a gera??o de thumbnails
server_thumbnailGenerationEnabled=true
#Instala o gerador de relatorios Birt
resource_birtreport_install=true

#
#Banco de Dados
#
#db.type= Renomeado para: db_type
#db.user= Renomeado para: db_user
#db.password= Renomeado para: db_password
#db.server= Renomeado para: db_server
#db.port= Renomeado para: db_port
#db.name= Renomeado para: db_name
#db.instance= Renomeado para: db_instance
#db.driver.path= Renomeado para: db_driverPath
#DBMinPoolSize= Renomeado para: db_minPoolSize
#DBMaxPoolSize= Renomeado para: db_maxPoolSize
#roDBMinPoolSize= Renomeado para: db_roMinPoolSize
#roDBMaxPoolSize= Renomeado para: db_roMaxPoolSize
#Tipo do banco de dados. Valores validos: mysql, sqlserver ou oracle
db_type=mysql
#Usuario para conexao no banco (valores padroes: mysql root, sqlserver sa, oracle sys)
db_user=root
#Senha do usuario do banco
db_password=rootpassword
#IP ou host do servidor de banco de dados
db_server=mysql
#Porta do servico de banco de dados (valores padroes: mysql 3306, sqlserver 1433, oracle 1521)
db_port=3306
#Para MySQL e SQLServer informar o nome do base. Para oracle informar o SID
db_name=fluig
#Caso o banco seja SqlServer e o servidor tenha mais de uma instancia informar o nome da mesma
db_instance=
#Caso o banco seja mysql informar o caminho do jar contendo os drivers jdbc
db_driverPath=/usr/share/java/mysql-connector-j-8.1.0.jar
#Tamanho minimo do pool de conexoes padrao
db_minPoolSize=10
#Tamanho maximo do pool de conexoes padrao
db_maxPoolSize=120
#Tamanho minimo do pool RO
db_roMinPoolSize=5
#Tamanho maximo do pool RO
db_roMaxPoolSize=50
#Versao do MySQL, caso esse seja o banco a ser utilizado
db_version=8

#
#e-mail
#
#email.server= Renomeado para: email_server
#email.port= Renomeado para: email_port
#email.default.sender= Renomeado para: email_defaultSender
#email.parameters.needAuth= Renomeado para: email_parametersNeedAuth
#email.auth.user=
#email.auth.password=
#Indica se o envio de email esta habilitado (true ou false)
email_enabled=true
#IP ou host do servidor de email
email_smtpServer=localhost
#Porta do servidor de email
email_smtpPort=25
#Servidor de email exige um sender (true ou false)
email_needsSender=false
#Endereco padrao do remetente
email_defaultSender=suporte@fluig.com
#Indica se o servidor de email exige autenticacao (true ou false)
email_needsAuth=false
#Tipo de seguranca exigida pelo servidor
email_securityType=none
#Usuario para autenticacao no servico de email
email_smtpUser=
#Senha da autenticacao de email
email_smtpPassword=
#Indica se deve enviar email para todas as notificacoes
email_allNotifications=false

#
#License Server
#
#license.type= Renomeado para: license_type
#ls.server= Renomeado para: ls_server
#ls.port= Renomeado para: ls_port
#Tipo do licenciamento. Valores validos: ls ou partner
license_type=ls
#IP ou host do License Server
ls_server=localhost
#Porta do servico do LS
ls_port=5555

#
#FTP Server
#
#Instalar o servidor FTP
resource_ftp_install=true
#Habilitar o servidor FTP
ftp_enabled=true
#Porta do servidor FTP
ftp_port=21
#Porta privada do servidor FTP
ftp_privatePort=8021

#
#Open Office
#
#Instalar OpenOffice
resource_openoffice_install=true
#Habilitar o OpenOffice
openoffice_enabled=true
#Portas OpenOffice
openoffice_port=15001,15002

#
#Fluig Analytics
#
#install.analytics= Renomeado para: resource_analytics_install
#Extracao de dados para o Fluig Analytics
resource_analytics_install=true

#
#Fluig Audit Extractor
#
#Extracao de dados para a auditoria
resource_auditExtractor_install=true

#
#Fluig Datatrace Extractor
#
#Extracao de rastreamento de dados
resource_datatraceExtractor_install=true

#
#Fluig Scheduler
#
#Execu??o das tarefas agendadas do Fluig
resource_scheduler_install=true

#
#Real Time
#
#install.node= Renomeado para: resource_node_install
#node.url= Renomeado para: node_server
#node.chat.port= Renomeado para: node_publicPort
#node.realtime.port= Renomeado para: node_privatePort
#Indica se o modulo do nodejs sera instalado (true ou false)
resource_node_install=true
#Indica se o Fluig usar? o realtime (true ou false). Em um ambiente cluster, o realtime pode estar habilitado (true) mesmo que o recurso n?o seja instalado (resource_node_install=false), desde que outro n? do cluster forne?a esse servi?o.
node_enabled=true
#URL do Servidor de Realtime (geralmente o mesmo do servidor; eg:  10.0.0.130)
node_server=127.0.0.1
#Porta do servico de chat
node_publicPort=7777
#Porta do servico de RealTime
node_privatePort=8888

#
#Solr
#
#install.solr=resource_solr_install
#url.solr=solr_url
#solr.remote=solr_remote
#solr.cloud=solr_cloud
#solr.jdk=solr_jdk
#Indica se os artefatos do indexador serao instalados (true ou false)
resource_solr_install=true
#URL do servidor de indexacao (geralmente o mesmo do servidor; eg. http://10.0.0.130:8983/solr)
solr_url=http://127.0.0.1:8983/solr
#Indica se a instala??o ser? feita para/em ambiente remoto (true ou false)
solr_remote=false
#Indica se a instala??o ser? feita para/em ambiente cloud (true ou false)
solr_cloud=false
#Indica o caminho da jdk a ser utilizada pelo solr remoto/cloud (opt/java/jdk-64)
solr_jdk=

