services:
  fluig:
    build:
      context: ./image
      dockerfile: Dockerfile
      args:
        TZ: America/Sao_Paulo
    image: fluig-docker-dev01
    container_name: fluig-dev01
    volumes:
      - fluig-volume-dev01:/var/fluig-volume
    ports:
      - 8080:8080
      - 7777:7777
      - 8888:8888
      - 8000:8000
      - 8983:8983
      - 9990:9990
    networks:
      - fluigNetwork-dev01
    depends_on:
      - mysql
      - emailsmtp
      
  mysql:
    image: mysql:8
    container_name: mysql-dev01
    command: ['mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_general_ci', '--lower_case_table_names=1', '--default_storage_engine=InnoDB']
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: 'rootpassword'
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: 'fluig'
      MYSQL_USER: 'fluig'
      MYSQL_PASSWORD: 'fluigpassword'
    networks:
      - fluigNetwork-dev01

  emailsmtp:
    image: maildev/maildev:latest
    container_name: emailsmtp-dev01
    environment:
      TZ: America/Sao_Paulo
    ports:
      - 1025:1025
      - 1080:1080
    networks:
      - fluigNetwork-dev01

networks:
  fluigNetwork-dev01:
    driver: bridge

volumes:
  fluig-volume-dev01:
